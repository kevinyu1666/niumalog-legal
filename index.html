<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>牛马日志 - 隐私政策与用户协议</title>
  <style>
    :root { color-scheme: light dark; --accent:#0f766e; --text:#18212f; --muted:#607086; --card:#ffffff; --bg:#f5f7fb; --line:#dbe3ef; }
    @media (prefers-color-scheme: dark) { :root { --text:#edf3ff; --muted:#a8b3c7; --card:#151b28; --bg:#0b1020; --line:#2a3448; } }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text); line-height:1.8; }
    main { max-width:860px; margin:0 auto; padding:44px 18px 64px; }
    header { margin-bottom:24px; }
    h1 { margin:0 0 8px; font-size:32px; letter-spacing:.02em; }
    h2 { margin:32px 0 12px; font-size:22px; }
    h3 { margin:22px 0 8px; font-size:17px; }
    p, li { font-size:15px; }
    a { color:var(--accent); text-decoration:none; font-weight:700; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:22px; margin:18px 0; box-shadow:0 12px 30px rgba(15,23,42,.06); }
    .muted { color:var(--muted); }
    .nav { display:flex; flex-wrap:wrap; gap:12px; margin-top:18px; }
    .nav a { border:1px solid var(--line); border-radius:999px; padding:8px 14px; background:var(--card); }
    footer { margin-top:36px; color:var(--muted); font-size:13px; }
  </style>
</head>
<body>
<main>
  <header>
    <h1>牛马日志</h1>
    <p class="muted">隐私政策与用户协议</p>
    <p class="muted">最近更新：2026 年 6 月 2 日</p>
    <div class="nav">
      <a href="privacy.html">查看隐私政策</a>
      <a href="terms.html">查看用户协议</a>
    </div>
  </header>
  <section class="card">
    <h2>说明</h2>
    <p>牛马日志是一款本地工时记录工具。当前版本不建立牛马日志服务器，不默认上传用户的打卡、定位、薪资、备份、PDF 报表或诊断日志数据。</p>
    <p>App Store Connect 的“隐私政策 URL”可以先填写本页面或 <a href="privacy.html">privacy.html</a>。如果后续功能发生变化，应先更新政策内容，再提交新版本。</p>
  </section>
  <footer>© 2026 牛马日志。保留所有权利。</footer>
</main>
</body>
</html>
